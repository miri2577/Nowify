[build]
  command = "npm run build && cp -r artframe/webui dist/artframe"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# WikiArt-Proxy: damit der Artframe-iframe CORS-frei auf wikiart.org
# zugreifen kann. Netlify forwarded den Request samt Query-Params.
[[redirects]]
  from = "/wikiart/*"
  to = "https://www.wikiart.org/:splat"
  status = 200
  force = true

# Bild-Proxy: CDN-Bilder von uploads*.wikiart.org CORS-frei runterladen
# (fuer Favoriten-Speicherung als Blob in IndexedDB).
[[redirects]]
  from = "/wikiart-img/:bucket/*"
  to = "https://:bucket.wikiart.org/:splat"
  status = 200
  force = true